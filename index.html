<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050510;
      --surface: #0a0a1a;
      --card: #0f0f20;
      --border: #1a1a3a;
      --border2: #252550;
      --accent: #00ffcc;
      --accent2: #ff00aa;
      --accent3: #ffcc00;
      --done: #00ffcc;
      --done-dim: rgba(0, 255, 204, 0.08);
      --text: #e0e8ff;
      --muted: #3a3a6a;
      --muted2: #6a6a9a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 20, 0.25) 2px, rgba(0, 0, 20, 0.25) 4px), repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(0, 255, 204, 0.015) 48px, rgba(0, 255, 204, 0.015) 49px), repeating-linear-gradient(0deg, transparent, transparent 48px, rgba(0, 255, 204, 0.015) 48px, rgba(0, 255, 204, 0.015) 49px);
    }

    body::after {
      background: radial-gradient(ellipse at 15% 50%, rgba(0, 255, 204, 0.05) 0%, transparent 55%), radial-gradient(ellipse at 85% 20%, rgba(255, 0, 170, 0.05) 0%, transparent 55%);
    }

    @keyframes glitch {
      0%, 88%, 100% {
        transform: none;
        filter: none;
      }
      90% {
        transform: translateX(-3px);
        filter: drop-shadow(3px 0 var(--accent2));
      }
      93% {
        transform: translateX(3px);
        filter: drop-shadow(-3px 0 var(--accent));
      }
      96% {
        transform: translateX(-1px);
      }
    }

    /* LOGIN */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .login-box {
      background: var(--surface);
      border: 2px solid var(--border2);
      box-shadow: 0 0 0 1px var(--border), 0 0 50px rgba(0, 255, 204, 0.06), inset 0 1px 0 rgba(0, 255, 204, 0.05);
      border-radius: 3px;
      padding: 48px 40px;
      width: 100%;
      max-width: 460px;
      text-align: center;
      animation: float-in 0.5s ease both;
      position: relative;
    }

    .login-title-big {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(32px, 8vw, 52px);
      line-height: 1;
      text-transform: uppercase;
      color: var(--text);
      animation: glitch 7s infinite;
    }

    .login-btn {
      width: 100%;
      background: transparent;
      color: var(--accent3);
      border: 2px solid var(--accent3);
      border-radius: 2px;
      padding: 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 8px;
    }

    .login-btn:hover {
      background: var(--accent3);
      color: #000;
      box-shadow: 0 0 24px rgba(255, 204, 0, 0.3);
    }

    /* HERO */
    .hero {
      padding: 28px 28px 20px;
      max-width: 860px;
      margin: 0 auto;
    }

    .hero-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 4vw, 36px);
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: -1px;
      animation: glitch 9s infinite;
      margin-bottom: 0;
    }

    /* BRANCH LABEL */
    .branch-label {
      max-width: 860px;
      margin: 0 auto;
      padding: 16px 28px 0;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* XP BAR */
    .xp-bar-wrap {
      height: 18px;
      background: var(--card);
      border: 2px solid var(--border2);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, .6);
    }

    .xp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 1px;
      transition: width 0.6s cubic-bezier(.34, 1.56, .64, 1);
      box-shadow: 0 0 10px var(--accent);
      position: relative;
    }

    /* LEADERBOARD */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      text-align: left;
      padding: 10px 16px;
      border-bottom: 2px solid var(--border2);
    }

    .crt-tv {
      position: relative;
      background: #1a1008;
      border-radius: 16px 16px 20px 20px;
      padding: 18px 20px 28px;
      border: 4px solid #3a2a10;
      box-shadow: 0 0 0 2px #2a1a08, 0 8px 24px rgba(0, 0, 0, .8), inset 0 2px 0 rgba(255, 255, 255, .05);
      max-width: 420px;
      width: 100%;
    }

    /* BUTTONS AND MODALS */
    .mode-btn {
      flex: 1;
      background: var(--card);
      border: 2px solid var(--border2);
      border-radius: 3px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .mode-btn:hover {
      border-color: var(--accent);
      background: rgba(0, 255, 204, .03);
    }

    .mode-btn.active {
      border-color: var(--accent);
      background: rgba(0, 255, 204, .05);
      box-shadow: 0 0 20px rgba(0, 255, 204, .08);
    }

    .mode-icon {
      font-size: 22px;
      margin-bottom: 4px;
      display: block;
    }

    /* MEDIA QUERIES */
    @media(max-width:600px) {
      .steps,
      .progress-wrap {
        padding: 0 16px;
      }
      .step-body {
        padding-left: 16px;
      }
      header {
        padding: 10px 16px;
      }
      .logo {
        font-size: 9px;
      }
      .login-box {
        padding: 36px 20px;
      }
      .hero-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div id="disclaimer-overlay">
    <div id="disclaimer-box">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="disclaimer-title">⚠ WARNING ⚠</div>
      <div class="disclaimer-body">
        This app is currently <strong>in development</strong>. Features may change, break, or disappear without notice.<br><br>
        <strong>This developer does not want or care about your personal information. Keep it to yourself.</strong><br><br>
        By pressing START you agree to interact at your own risk.
      </div>
      <button class="disclaimer-btn" id="disclaimer-btn">▶ Press Start</button>
    </div>
  </div>

  <div id="login-screen">
    <div class="login-box">
      <div class="login-hero">
        <img id="pixel-login" src="your-image-source" alt="Pixel art character">
      </div>
      <div class="login-title-big">Level Up</div>
      <button class="login-btn">Login</button>
    </div>
  </div>

  <script>
    // Add your JavaScript functionality here
  </script>

</body>
</html>
