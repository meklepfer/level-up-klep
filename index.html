<!DOCTYPE html>
<html>
<head>
    <title>Level Up Klep</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js"></script>
</head>
<body>
    <h1>Welcome to Level Up Klep!</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: 'AIzaSyD8iA8-DY1VM5Qt6ejFDWQ5u_n31Ur7OuI',
            authDomain: 'level-up-klep.firebaseapp.com',
            databaseURL: 'https://level-up-klep-default-rtdb.firebaseio.com',
            projectId: 'level-up-klep',
            storageBucket: 'level-up-klep.firebasestorage.app',
            messagingSenderId: '616259528679',
            appId: '1:616259528679:web:b614c68ce644dfe84d3f42'
        };

        // Initialize Firebase
        let app, db;
        try {
            app = firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            console.log('Firebase initialized successfully.');
            document.body.innerHTML += '<p>Status: Firebase initialized successfully.</p>';
        } catch (error) {
            console.error('Error initializing Firebase:', error);
            document.body.innerHTML += '<p>Status: Error initializing Firebase. Check console for details.</p>';
        }

        // Canvas initialization
        try {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            console.log('Canvas initialized successfully.');
            document.body.innerHTML += '<p>Status: Canvas initialized successfully.</p>';
        } catch (error) {
            console.error('Error initializing canvas:', error);
            document.body.innerHTML += '<p>Status: Error initializing canvas. Check console for details.</p>';
        }

        // Web Audio API - Check for Audio Context
        let audioContext;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            console.log('Web Audio API initialized successfully.');
            document.body.innerHTML += '<p>Status: Web Audio API initialized successfully.</p>';
        } catch (error) {
            console.error('Error initializing Web Audio API:', error);
            document.body.innerHTML += '<p>Status: Error initializing Web Audio API. Check console for details.</p>';
        }

        // Test function to verify Firebase connection
        function testFirebaseConnection() {
            try {
                db.ref('test').set({ success: true });
                console.log('Firebase connection test successful.');
                document.body.innerHTML += '<p>Status: Firebase connection test successful.</p>';
            } catch (error) {
                console.error('Firebase connection test failed:', error);
                document.body.innerHTML += '<p>Status: Firebase connection test failed. Check console for details.</p>';
            }
        }

        testFirebaseConnection();
    </script>
</body>
</html>
